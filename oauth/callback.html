<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AirFace – Connecting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px; text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h2   { font-size: 20px; margin-bottom: 8px; }
    p    { font-size: 14px; color: #888; line-height: 1.5; }
    .error h2 { color: #ff6b6b; }
    .success .icon { animation: pop .3s ease; }
    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      80%  { transform: scale(1.15); }
      100% { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="icon" id="icon">⏳</div>
  <h2 id="heading">Connecting…</h2>
  <p id="msg">Exchanging authorization code with Google.</p>

  <script>
    var REDIRECT_URI = 'https://airfaceapp.github.io/oauth/callback.html';

    function showError(text) {
      document.body.className = 'error';
      document.getElementById('icon').textContent = '✕';
      document.getElementById('heading').textContent = 'Connection failed';
      document.getElementById('msg').textContent = text;
    }

    function showSuccess() {
      document.body.className = 'success';
      document.getElementById('icon').textContent = '✓';
      document.getElementById('heading').textContent = 'Connected!';
      document.getElementById('msg').textContent = 'Returning to your watch…';
    }

    async function handleCallback() {
      var params   = new URLSearchParams(window.location.search);
      var code     = params.get('code');
      var error    = params.get('error');

      if (error || !code) {
        showError('Authorization denied: ' + (error || 'no code returned'));
        return;
      }

      var codeVerifier = localStorage.getItem('airface_code_verifier');
      if (!codeVerifier) {
        showError('Session expired — please try connecting again.');
        return;
      }
      localStorage.removeItem('airface_code_verifier');

      var clientId     = localStorage.getItem('airface_client_id');
      var clientSecret = localStorage.getItem('airface_client_secret');
      if (!clientId || !clientSecret) {
        showError('Client credentials not found — enter your Client ID and Secret in AirFace settings and try again.');
        return;
      }

      try {
        var body = new URLSearchParams({
          code:          code,
          client_id:     clientId,
          client_secret: clientSecret,
          redirect_uri:  REDIRECT_URI,
          grant_type:    'authorization_code',
          code_verifier: codeVerifier
        });

        var resp = await fetch('https://oauth2.googleapis.com/token', {
          method:  'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body:    body.toString()
        });

        var tokens = await resp.json();
        if (!resp.ok) throw new Error(tokens.error_description || tokens.error || 'token exchange failed');

        if (!tokens.refresh_token) {
          throw new Error('No refresh token — re-authorize with prompt=consent');
        }

        showSuccess();

        var isPebble = navigator.userAgent.indexOf('Pebble') !== -1 ||
                       window.location.href.indexOf('pebble') !== -1;
        if (!isPebble) {
          if (localStorage.getItem('airface_dev') === '1') {
            document.getElementById('msg').innerHTML =
              '<small style="word-break:break-all;font-family:monospace;font-size:11px;color:#4caf50">' +
              'DEV — refresh token:<br>' + tokens.refresh_token + '</small>';
          } else {
            document.getElementById('msg').textContent =
              'Open AirFace from the Pebble app to finish connecting.';
          }
          return;
        }

        setTimeout(function() {
          window.location = 'pebblejs://close#' +
            encodeURIComponent(JSON.stringify({ refresh_token: tokens.refresh_token }));
        }, 800);

      } catch (e) {
        showError(e.message);
      }
    }

    handleCallback();
  </script>
</body>
</html>
